version: 1
updated_at: 2026-06-15
policy:
  production_forbids_upstream_floating_refs: true
  allowed_floating_refs:
    - none
  requires_explicit_local_apply_for_clone_or_fetch: true
  remote_mutation_forbidden:
    - push
    - merge
    - rebase
    - tag
    - delete
    - pr
  sudo_allowed: false
sources:
  hermes-agent:
    component: hermes-runtime
    upstream:
      owner_repo: NousResearch/hermes-agent
      git: https://github.com/NousResearch/hermes-agent.git
      default_branch: main
    controlled:
      owner_repo: pending-controlled-mirror/hermes-agent
      git: pending-controlled-mirror
      ref: f3fe99863d134bd05316882dee0d469439110ca6
      audited_from_upstream_ref: main
      audited_at: 2026-06-15T00:00:00Z
    production_ref_policy:
      allow_upstream_main: false
      allow_upstream_head: false
      require_controlled_ref: true
    license:
      spdx: MIT
      commercial_use_requires_license: false
    local_sync:
      path: provision/sources/worktrees/hermes-agent
      mode: mirror-or-fork-audited-locally
    notes:
      - Repo oficial do Hermes Agent.
      - Repo controlado remoto ainda não criado; esta ref é pin auditado do upstream oficial.
      - Nunca promover upstream main diretamente para produção.
  hermes-webui:
    component: web-ui-cockpit
    upstream:
      owner_repo: nesquena/hermes-webui
      git: https://github.com/nesquena/hermes-webui.git
      default_branch: master
    controlled:
      owner_repo: elderbernardi/hermes-webui
      git: https://github.com/elderbernardi/hermes-webui.git
      ref: exocortex/stable
      audited_from_upstream_ref: v0.51.440
      audited_at: 2026-06-15T00:00:00Z
    production_ref_policy:
      allow_upstream_main: false
      allow_upstream_head: false
      require_controlled_ref: true
    license:
      spdx: MIT
      commercial_use_requires_license: false
    local_sync:
      path: provision/sources/worktrees/hermes-webui
      mode: fork-audited-locally
    notes:
      - Web UI comunitária oficial do Hermes Agent (nesquena/hermes-webui).
      - Licença MIT — uso comercial irrestrito.
      - Substitui EKKOLearnAI/hermes-web-ui (BSL 1.1) removido em 2026-06-15.
      - Stack Python + Vanilla JS, zero build step.
      - Fork controlado: elderbernardi/hermes-webui, branch exocortex/stable (skin EXCRTX, MOD-001..005). Ver EXOCRTX_MODIFICATIONS.md no fork.
      - Nunca consumir upstream master como produção.
  docbrain:
    # INFORMATIONAL entry — DocBrain intentionally tracks origin/main (not a pinned SHA).
    # Product decision: delivery continuity takes priority over reproducibility for this component.
    # Trade-off recorded in the exocortex→docbrain contract and CHANGELOG (handled by E1/A4).
    component: docbrain-parser-engine
    upstream:
      owner_repo: elderbernardi/docbrain
      git: https://github.com/elderbernardi/docbrain
      default_branch: main
      branch: main
    production_ref_policy:
      allow_upstream_main: true
      allow_upstream_head: false
      require_controlled_ref: false
    # last_seen_sha: informational snapshot only — not enforced by step-08
    # last_seen_sha: <updated-on-each-provision>
    license:
      spdx: MIT
      commercial_use_requires_license: false
    local_sync:
      path: provision/sources/worktrees/docbrain
      mode: track-upstream-main
    notes:
      - DocBrain parser engine — clonado/atualizado em $EXOCORTEX_HOME/tools/docbrain pelo step-08.
      - Rastreia origin/main (elderbernardi/docbrain); deps refrescadas com npm install a cada provision.
      - Não usa SHA pin — allow_upstream_main é true por decisão de produto.
