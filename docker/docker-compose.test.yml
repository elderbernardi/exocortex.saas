# =============================================================================
# Exocórtex.IA — Docker Compose para Teste PDD v2
# =============================================================================
# Uso:
#   # Build (primeira vez):
#   docker compose -f docker/docker-compose.test.yml build
#
#   # Rodar teste:
#   docker compose -f docker/docker-compose.test.yml run --rm test bash
#
#   # Dentro do container, executar:
#   /workspace/docker/test-entrypoint.sh
#
#   # Limpar volume (Hermes limpo):
#   docker compose -f docker/docker-compose.test.yml down -v
# =============================================================================

services:
  test:
    image: hermes-agent:local
    container_name: exocortex-v2-test
    network_mode: host
    stdin_open: true
    tty: true

    volumes:
      # Volume nomeado para Hermes limpo (NÃO monta ~/.hermes)
      - hermes-test-data:/opt/data

      # Workspace do projeto
      - ${PWD}:/workspace:rw

      # Credenciais do host (read-only)
      - ${HOME}/.hermes/.env:/opt/secrets/.env:ro
      - ${HOME}/.hermes/auth.json:/opt/secrets/auth.json:ro
      - ${HOME}/.hermes/config.yaml:/opt/secrets/config.yaml:ro

    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_HOME=/opt/data
      - WORKSPACE=/workspace

    # Override para manter container vivo em modo interativo.
    # O /init do s6-overlay roda cont-init.d (chown, config seed)
    # e depois executa o CMD (sleep infinity mantém vivo).
    command: ["sleep", "infinity"]

volumes:
  hermes-test-data:
