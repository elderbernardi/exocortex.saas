<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exocórtex Inbox</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --line: #334155;
      --accent: #16a34a;
      --accent-2: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: linear-gradient(180deg, #0b1220, #111827);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(780px, 100%);
      background: rgba(17,24,39,.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 30px 80px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { color: var(--muted); line-height: 1.45; }
    .dropzone {
      border: 2px dashed #475569;
      border-radius: 16px;
      padding: 36px;
      text-align: center;
      margin: 20px 0;
      transition: border-color .2s ease, background .2s ease;
      background: rgba(15,23,42,.45);
    }
    .dropzone.drag { border-color: var(--accent); background: rgba(22,163,74,.08); }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
    input, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    textarea { min-height: 100px; resize: vertical; }
    button {
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
    }
    .result {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-top: 18px;
      font-size: 13px;
      overflow: auto;
      max-height: 320px;
    }
    .accent { color: #86efac; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="card">
    <h1>Exocórtex Inbox</h1>
    <p>Arraste um arquivo ou envie texto. O bruto cai em <span class="accent">_inbox</span>, passa por triagem e só depois pode ser promovido ao Acervo.</p>

    <div id="dropzone" class="dropzone">
      <strong>Arraste um arquivo aqui</strong><br>
      <span>ou clique para escolher</span>
      <input id="fileInput" type="file" hidden>
    </div>

    <div class="grid">
      <div>
        <label>Título</label>
        <input id="title" placeholder="Título do intake">
      </div>
      <div>
        <label>Microverso sugerido</label>
        <input id="microverso" placeholder="ensino, dev, gabinete...">
      </div>
      <div>
        <label>Canal</label>
        <input id="channel" value="dashboard">
      </div>
      <div>
        <label>Caption</label>
        <input id="caption" placeholder="Contexto curto do anexo">
      </div>
    </div>

    <label style="margin-top:14px">Texto puro (opcional, em vez de arquivo)</label>
    <textarea id="text" placeholder="Cole aqui uma nota, briefing, trecho ou ata."></textarea>

    <button id="submitBtn">Enviar para intake</button>
    <div id="result" class="result">Aguardando envio...</div>
  </main>

  <script>
    const apiBase = 'http://127.0.0.1:8765';
    const dz = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const result = document.getElementById('result');
    let selectedFile = null;

    function show(data) {
      result.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    dz.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      selectedFile = fileInput.files[0] || null;
      show(selectedFile ? `Arquivo selecionado: ${selectedFile.name}` : 'Nenhum arquivo selecionado.');
    });
    ['dragenter', 'dragover'].forEach(evt => dz.addEventListener(evt, e => {
      e.preventDefault();
      dz.classList.add('drag');
    }));
    ['dragleave', 'drop'].forEach(evt => dz.addEventListener(evt, e => {
      e.preventDefault();
      dz.classList.remove('drag');
    }));
    dz.addEventListener('drop', e => {
      selectedFile = e.dataTransfer.files[0] || null;
      show(selectedFile ? `Arquivo selecionado: ${selectedFile.name}` : 'Nenhum arquivo selecionado.');
    });

    async function submit() {
      const title = document.getElementById('title').value;
      const microverso = document.getElementById('microverso').value;
      const channel = document.getElementById('channel').value || 'dashboard';
      const caption = document.getElementById('caption').value;
      const text = document.getElementById('text').value.trim();
      show('Enviando...');
      try {
        let res;
        if (selectedFile) {
          const fd = new FormData();
          fd.append('file', selectedFile);
          if (title) fd.append('title', title);
          if (microverso) fd.append('microverso_hint', microverso);
          if (channel) fd.append('channel', channel);
          if (caption) fd.append('caption', caption);
          res = await fetch(apiBase + '/v1/intake/upload', { method: 'POST', body: fd });
        } else if (text) {
          res = await fetch(apiBase + '/v1/intake/text', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ title, microverso_hint: microverso, channel, caption, text }),
          });
        } else {
          show('Envie um arquivo ou preencha o texto.');
          return;
        }
        show(await res.json());
      } catch (err) {
        show(String(err));
      }
    }

    document.getElementById('submitBtn').addEventListener('click', submit);
  </script>
</body>
</html>
