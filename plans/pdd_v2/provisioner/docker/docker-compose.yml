version: "3.8"

services:
  exocortex:
    image: hermes-agent:local
    container_name: exocortex-provisioner
    volumes:
      # Persistent data
      - hermes-data:/opt/data
      # Repository (read-only — source of golden image)
      - ./../../..:/workspace:ro
      # Credentials (optional — mount from host)
      - ${HERMES_SECRETS:-~/.hermes}/.env:/opt/secrets/.env:ro
    environment:
      HERMES_HOME: /opt/data
      HERMES_MODEL: ${HERMES_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTORUN: ${AUTORUN:-false}
    entrypoint: /workspace/plans/pdd_v2/provisioner/docker/entrypoint.sh
    working_dir: /workspace
    tty: true
    stdin_open: true

volumes:
  hermes-data:
    driver: local
