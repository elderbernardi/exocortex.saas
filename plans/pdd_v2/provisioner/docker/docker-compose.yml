version: "3.8"

services:
  exocortex:
    build:
      context: ../../..
      dockerfile: plans/pdd_v2/provisioner/docker/Dockerfile
    image: exocortex-provisioner:latest
    container_name: exocortex-provisioner
    volumes:
      - hermes-data:/opt/data
      # Mount host credentials (optional)
      - ${HERMES_SECRETS:-~/.hermes}/.env:/opt/secrets/.env:ro
    environment:
      HERMES_HOME: /opt/data
      HERMES_MODEL: ${HERMES_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AUTORUN: ${AUTORUN:-false}
      PDD_PHASE: ${PDD_PHASE:-}
    tty: true
    stdin_open: true

volumes:
  hermes-data:
    driver: local
