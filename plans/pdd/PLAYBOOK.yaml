# exocortex-playbook.yaml
# Prompt-Driven Development Playbook for Exocórtex.IA
# Version: 1.1.0
# License: MIT (same as Hermes Agent)
#
# USAGE:
#   Manual: Execute prompts 001-031 sequentially via hermes CLI
#   Automated: hermes-trainer run playbook.yaml --target <container>
#
# CONVENTION:
#   - Each prompt has an ID (3 digits), phase, and expected artifacts
#   - checkpoint: true means self-test must pass before continuing
#   - min_score: minimum self-test score to advance
#   - max_retries: how many self-repair attempts before escalating

version: "1.1.0"
target: "hermes-agent"
metadata:
  product: "Exocórtex.IA"
  methodology: "PDD (Prompt-Driven Development)"
  total_prompts: 31
  total_phases: 7  # P0 is manual
  quality_skills:
    - name: stop-slop
      source: https://github.com/hardikpandya/stop-slop
      purpose: "Eliminates predictable AI writing patterns from prose"
    - name: taste-skill
      source: https://github.com/Leonxlnx/taste-skill
      purpose: "Breaks LLM statistical defaults in UI/visual generation"
      sub_skills: [gpt-taste, brandkit, brutalist]

# =============================================================================
# 🔴 AGENT PROTOCOL: CONFIGURATION DISCIPLINE
# =============================================================================
# Este projeto é uma META-CONFIGURAÇÃO. Ele não configura o Hermes uma vez —
# ele é a RECEITA REPRODUZÍVEL para configurar QUALQUER instância do Exocórtex.
#
# TODO agente que trabalhar neste projeto DEVE seguir estas regras:
# =============================================================================
agent_protocol:
  name: "Configuration Discipline"
  scope: "ALL agents, ALL sessions, ALL phases"
  mandatory: true

  rules:
    # REGRA 1: Tudo que é executado deve ser registrado
    - id: LOG_ALL_ACTIONS
      rule: >
        Toda ação que modifique o ambiente Hermes (instalar skill, instalar CLI,
        adicionar MCP, modificar config.yaml, criar/editar arquivo de
        configuração) DEVE ser registrada no session log da fase atual.
      log_format: |
        ### [PDD-{PHASE}-{SEQ}] {TIMESTAMP} | Phase: {PHASE} | Action: {DESC}
        #### Context: {WHY}
        #### Commands Executed: ```bash {EXACT_COMMANDS}```
        #### Files Modified: {LIST}
        #### Verification: ```bash {SMOKE_TEST}```
      log_path: "plans/pdd/logs/session_{PHASE}.log"

    # REGRA 2: Tudo que é executado deve ser reproduzível
    - id: UPDATE_SETUP_SCRIPT
      rule: >
        Toda ação de configuração de ambiente (install, copy, mkdir, pip, etc.)
        DEVE ser refletida no setup.sh para que um Hermes limpo possa
        reproduzir o estado completo. Se a ação não pode ser automatizada,
        documentar como comentário no setup.sh com instruções manuais.
      setup_path: "setup.sh"

    # REGRA 3: Verificar antes de declarar pronto
    - id: VERIFY_BEFORE_DONE
      rule: >
        Toda instalação (skill, CLI, dependência) DEVE ter um smoke test
        imediatamente após. Nunca declarar "instalado" sem evidência de
        funcionamento. Registrar o output do teste no session log.

    # REGRA 4: Backlog tem critérios de reavaliação
    - id: BACKLOG_WITH_CRITERIA
      rule: >
        Itens diferidos para backlog DEVEM incluir: motivo do diferimento,
        critérios de reavaliação (quando voltar a avaliar), e dependências.
        Usar BACKLOG_INTEGRATIONS.md como referência.
      backlog_path: "plans/pdd/BACKLOG_INTEGRATIONS.md"

    # REGRA 5: Estado é verdade — não a memória do agente
    - id: STATE_IS_TRUTH
      rule: >
        Antes de executar qualquer ação, o agente DEVE verificar o estado
        real do ambiente (hermes skills list, command -v, ls, etc.) em vez de
        confiar na própria memória. O estado do sistema é a fonte de verdade,
        não o contexto da conversa.

  # Checklist de pré-commit mental para todo agente
  pre_action_checklist:
    - "Verifiquei o estado atual? (skills list, file exists, etc.)"
    - "Sei em qual fase/prompt estou?"
    - "O session log desta fase está aberto?"
    - "Sei como vou verificar que funcionou?"

  post_action_checklist:
    - "Registrei no session log? (comando + output + verificação)"
    - "Atualizei o setup.sh? (se foi ação de ambiente)"
    - "O smoke test passou?"
    - "Algum outro arquivo precisa refletir esta mudança? (PLAN, BACKLOG, etc.)"

phases:
  # ─── P1: IDENTITY ──────────────────────────────────────────
  - id: P1_IDENTITY
    name: "Identity — Alma do Exocórtex"
    description: "Self-test skill, SOUL.md, behavioral boundaries, prompt logging"
    prompts:
      - id: "001"
        name: "Bootstrap Self-Test"
        content_ref: "phases/P1_IDENTITY.md#prompt-001"
        artifact_ref: "artifacts/SELF_TEST_SKILL.md"
        expected_artifacts:
          - path: "skills/exocortex-self-test/SKILL.md"
            check: exists
          - path: "SOUL.md"
            check: contains
            value: "Configuration State"
        checkpoint: false

      - id: "002"
        name: "Core Identity"
        content_ref: "phases/P1_IDENTITY.md#prompt-002"
        artifact_ref: "artifacts/SOUL_SEED.md"
        expected_artifacts:
          - path: "SOUL.md"
            check: contains
            value: "Exocórtex"
          - path: "SOUL.md"
            check: contains
            value: "# Values"
        checkpoint: false

      - id: "003"
        name: "Behavioral Boundaries"
        content_ref: "phases/P1_IDENTITY.md#prompt-003"
        expected_artifacts:
          - path: "SOUL.md"
            check: contains
            value: "Draft-First Protocol"
          - path: "SOUL.md"
            check: contains
            value: "Behavioral Boundaries"
        checkpoint: false

      - id: "004"
        name: "Prompt Log Skill"
        content_ref: "phases/P1_IDENTITY.md#prompt-004"
        expected_artifacts:
          - path: "skills/exocortex-prompt-log/SKILL.md"
            check: exists
          - path: "MEMORY.md"
            check: contains
            value: "PDD-001"
        checkpoint: false

      - id: "004B"
        name: "Install stop-slop (Quality Gate Textual)"
        content_ref: "phases/P1_IDENTITY.md#prompt-004b"
        artifact_ref: "artifacts/STOP_SLOP_SKILL.md"
        expected_artifacts:
          - path: "skills/stop-slop/SKILL.md"
            check: exists
          - path: "SOUL.md"
            check: contains
            value: "Output Autêntico"
        checkpoint: false

      - id: "004C"
        name: "Install taste-skill (Quality Gate Visual)"
        content_ref: "phases/P1_IDENTITY.md#prompt-004c"
        artifact_ref: "artifacts/TASTE_SKILL.md"
        expected_artifacts:
          - path: "skills/taste-skill/SKILL.md"
            check: exists
          - path: "skills/taste-skill/gpt-taste.md"
            check: exists
          - path: "skills/taste-skill/brandkit.md"
            check: exists
          - path: "skills/taste-skill/brutalist.md"
            check: exists
          - path: "SOUL.md"
            check: contains
            value: "Excelência Visual"
        checkpoint: false

      - id: "005"
        name: "P1 Checkpoint"
        content_ref: "phases/P1_IDENTITY.md#prompt-005"
        checkpoint: true
        min_score: 2
        max_retries: 3

  # ─── P2: MEMORY ────────────────────────────────────────────
  - id: P2_MEMORY
    name: "Memory — Estrutura Cognitiva"
    description: "Acervo Cognitivo, 7 Nature skills, Microverso CRUD, semantic search"
    prompts:
      - id: "006"
        name: "Acervo Structure"
        content_ref: "phases/P2_MEMORY.md#prompt-006"
        expected_artifacts:
          - path: "acervo/macro/soul.md"
            check: exists
          - path: "acervo/micro/_template/contexto.md"
            check: exists
        checkpoint: false

      - id: "007"
        name: "7 Nature Skills"
        content_ref: "phases/P2_MEMORY.md#prompt-007"
        expected_artifacts:
          - path: "skills/nature-contexto/SKILL.md"
            check: exists
          - path: "skills/nature-reflexao/SKILL.md"
            check: exists
        checkpoint: false

      - id: "008"
        name: "Microverso Creation"
        content_ref: "phases/P2_MEMORY.md#prompt-008"
        expected_artifacts:
          - path: "skills/exocortex-new-microverso/SKILL.md"
            check: exists
        checkpoint: false

      - id: "009"
        name: "Memory Indexing"
        content_ref: "phases/P2_MEMORY.md#prompt-009"
        checkpoint: false

      - id: "010"
        name: "P2 Checkpoint"
        content_ref: "phases/P2_MEMORY.md#prompt-010"
        checkpoint: true
        min_score: 3
        max_retries: 3

  # ─── P3: TOOLS & GOVERNANCE ──────────────────────────────────
  # MCPs 011-014 diferidos → BACKLOG_INTEGRATIONS.md
  # Motivo: zero dependências em P4/P5, requerem API keys não disponíveis
  - id: P3_TOOLS
    name: "Tools & Governance (Core)"
    description: "Tool governance skill, skill bundle, profiles por vetor. MCPs externos diferidos para backlog."
    prompts:
      - id: "015"
        name: "Tool Governance"
        content_ref: "phases/P3_TOOLS.md#prompt-015"
        expected_artifacts:
          - path: "skills/exocortex-tool-governance/SKILL.md"
            check: exists
        checkpoint: false
      - id: "016"
        name: "Bundle exocortex-alpha"
        content_ref: "phases/P3_TOOLS.md#prompt-016"
        expected_artifacts:
          - path: "skill-bundles/exocortex-alpha"
            check: exists
        checkpoint: false
      - id: "017"
        name: "Profiles (Exec/Evol)"
        content_ref: "phases/P3_TOOLS.md#prompt-017"
        checkpoint: false
      - id: "018"
        name: "P3 Checkpoint"
        content_ref: "phases/P3_TOOLS.md#prompt-018"
        checkpoint: true
        min_score: 4
        max_retries: 3

  # ─── P4: BEHAVIOR ──────────────────────────────────────────
  - id: P4_BEHAVIOR
    name: "Business Rules + Quality Gate"
    description: "Draft-First, Vetor Ativo, Canvas Cognitivo, Briefing, Onboarding, Output Quality Gate"
    prompts:
      - id: "019"
        name: "Draft-First Skill"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-019"
        checkpoint: false
      - id: "020"
        name: "Vetor Ativo"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-020"
        checkpoint: false
      - id: "021"
        name: "Canvas Cognitivo"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-021"
        checkpoint: false
      - id: "022"
        name: "Morning Briefing"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-022"
        checkpoint: false
      - id: "023"
        name: "Onboarding Skill"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-023"
        checkpoint: false
      - id: "024"
        name: "Output Quality Gate"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-024"
        expected_artifacts:
          - path: "skills/exocortex-output-quality-gate/SKILL.md"
            check: exists
        checkpoint: false
      - id: "025"
        name: "Behavioral Tests (incl. Quality)"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-025"
        checkpoint: false
      - id: "026"
        name: "P4 Checkpoint"
        content_ref: "phases/P4_BEHAVIOR.md#prompt-026"
        checkpoint: true
        min_score: 4
        max_retries: 3

  # ─── P5: VALIDATION ────────────────────────────────────────
  - id: P5_VALIDATION
    name: "Validation & Self-Repair (incl. Quality Audit)"
    description: "End-to-end smoke tests with quality gate validation, self-repair loop, graduation"
    prompts:
      - id: "029"
        name: "Full Smoke Test (incl. Quality Gate)"
        content_ref: "phases/P5_VALIDATION.md#prompt-029"
        checkpoint: false
      - id: "030"
        name: "Self-Repair Loop"
        content_ref: "phases/P5_VALIDATION.md#prompt-030"
        checkpoint: false
        max_retries: 3
      - id: "031"
        name: "Graduation"
        content_ref: "phases/P5_VALIDATION.md#prompt-031"
        checkpoint: true
        min_score: 5
        max_retries: 0  # No retries — must be 5/5
