# microverso.yaml — manifesto do microverso Estúdio Criativo (excrtx/v1)
# Canônico. Ref: global/contracts/microverso-package-spec.md
# Gerado por: excrtx-memory-mvexport / microverso_package.py

apiVersion: excrtx/v1
kind: Microverso
metadata:
  name: estudio-criativo
  version: 1.0.0
  description: "Microverso transversal do Exocórtex para criação, pesquisa, linguagem, design, produção e aprendizado criativo aplicados a demandas próprias ou de outros microversos."
  author: exocortex-team
  tags: [criativo, pesquisa, linguagem, design, produção, aprendizado, transversal]

requires:
  skills:
    - excrtx-produce-slides
    - excrtx-quality-designsys
    - excrtx-behavior-canvas
    - excrtx-quality-antislop
    - excrtx-quality-taste
  python_packages:
    - python-pptx>=0.6.21
  node_packages: []
  mcps: []
  env: []
  system: [git, python3]

compat:
  exocortex_version: ">=0.4"
  hermes_version: ">=0.4"
  platforms: [linux]

tree:
  context/: "Situação atual e modelo de tarefa mista do Estúdio"
  knowledge/: "Base de capacidades, repertório e mapa de ferramentas"
  contracts/: "Contratos operacionais, de governança e de preservação canônica do Estúdio"
  prompts/: "Prompts testados para briefing, crítica e produção criativa"
  persona/: "Personas operacionais do Estúdio (diretor criativo, estrategista, redator, etc.)"
  workflows/: "Workflows de intake, pesquisa, produção, crítica e aprendizagem"
  skills/: "Skills locais do microverso (campanha, crítica, seleção de formato, etc.)"
  tools/: "Documentação da stack criativa acionável"
  templates/: "Templates reutilizáveis de briefing, campanha, learning card e pós-projeto"
  decisions/: "Decisões arquiteturais do microverso"
  reflections/: "Reflexões canônicas sobre método e evolução do Estúdio"
  _meta/: "Índice canônico, schema local e log"
  raw/: "Fontes brutas (imutáveis)"
  _archive/: "Conteúdo supersedido"

hooks: {}
