# microverso.yaml — manifesto de um microverso empacotado
# Ref: ADR-016 (Microverso Package Format)

apiVersion: excrtx/v1
kind: Microverso
metadata:
  name: estudio-criativo
  version: 1.0.0
  description: "Microverso transversal do Exocórtex para criação, pesquisa, linguagem, design, produção e aprendizado criativo aplicados a demandas próprias ou de outros microversos."
  author: exocortex-team
  tags: [criativo, pesquisa, linguagem, design, produção, aprendizado, transversal]

# Dependências
requires:
  skills:
    - excrtx-produce-slides       # Geração de slides e apresentações
    - excrtx-quality-designsys    # Design system e tokens visuais
    - excrtx-behavior-canvas      # Canvas cognitivo para planejamento
    - excrtx-quality-antislop     # Filtro anti-slop textual
    - excrtx-quality-taste        # Filtro anti-slop visual
  python_packages:
    - python-pptx>=0.6.21         # Geração de .pptx
  node_packages: []
  mcps: []

# Estrutura (relativa ao diretório do pacote)
tree:
  contracts/: "Contratos operacionais, de governança e de preservação canônica do Estúdio"
  workflows/: "Workflows de intake, pesquisa, produção, crítica e aprendizagem"
  templates/: "Templates reutilizáveis de briefing, campanha, learning card e pós-projeto"
  persona/: "Personas operacionais do Estúdio"
  prompts/: "Prompts testados para briefing, crítica e produção criativa"
  knowledge/: "Base de capacidades, repertório e mapa de ferramentas"
  decisions/: "Decisões locais do microverso"
  reflections/: "Reflexões canônicas sobre método e evolução do Estúdio"
  tools/: "Documentação da stack criativa acionável"
  skills/: "Skills locais do microverso"
  context/: "Contexto estrutural do modo de operação do Estúdio"
  _meta/: "Índice canônico e schema local do microverso"

# Hooks (opcionais)
hooks: {}
  # post_install: "scripts/post_install.sh"
  # validate: "scripts/validate.sh"
